<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e7;font-family:'Inter',sans-serif;padding:24px;min-height:100vh}

.status.invalid{background:#dc262622;color:#f87171;border:1px solid #dc262644}
</style>

<body>
<a class="back" href="/">&#8592; All Tools</a>
<h1>YAML / JSON Converter</h1>

<div class="columns">
<div class="panel">
<div class="row">
<div class="section-title" style="margin:0;flex:1">YAML</div>
<span id="yamlStatus" class="status valid">Valid</span>
<button class="small secondary" onclick="formatYaml()">Format</button>
<button class="small secondary" onclick="copyYaml()">Copy</button>
</div>
<textarea id="yamlInput" spellcheck="false">
# Server config
server:
  host: localhost
  port: 8080
  ssl: true

database:
  driver: postgres
  host: db.example.com
  port: 5432
  name: myapp
  credentials:
    username: admin
    password: secret123

features:
  - name: auth
    enabled: true
  - name: logging
    enabled: true
    level: debug
  - name: cache
    enabled: false

limits:
  max_connections: 100
  timeout: 30
  retry_count: 3</textarea>
<div class="error-msg" id="yamlError"></div>
</div>

<div class="panel">
<div class="row">
<div class="section-title" style="margin:0;flex:1">JSON</div>
<span id="jsonStatus" class="status valid">Valid</span>
<button class="small secondary" onclick="formatJson()">Format</button>
<button class="small secondary" onclick="copyJson()">Copy</button>
</div>
<textarea id="jsonInput" spellcheck="false"></textarea>
<div class="error-msg" id="jsonError"></div>
</div>
</div>

<div class="row" style="justify-content:center;margin:8px 0">
<button onclick="yamlToJson()">YAML &rarr; JSON</button>
<button onclick="jsonToYaml()">JSON &rarr; YAML</button>
</div>

<script>
const yamlInput = document.getElementById('yamlInput');
const jsonInput = document.getElementById('jsonInput');

// ---- Minimal YAML parser ----
function parseYaml(text) {
  const lines = text.split('\n');
  const result = {};
  const stack = [{obj: result, indent: -1}];

  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i];
    const trimmed = raw.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;

    const indent = raw.search(/\S/);
    const arrayMatch = trimmed.match(/^-\s+(.*)/);

    if (arrayMatch) {
      // Array item
      while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
      const parent = stack[stack.length - 1];
      const lastKey = parent.lastKey;
      if (lastKey && !Array.isArray(parent.obj[lastKey])) parent.obj[lastKey] = [];

      const itemContent = arrayMatch[1];
      const kvMatch = itemContent.match(/^(\S+):\s*(.*)/);
      if (kvMatch) {
        const itemObj = {};
        itemObj[kvMatch[1]] = parseValue(kvMatch[2]);
        parent.obj[lastKey].push(itemObj);
        stack.push({obj: itemObj, indent: indent + 2, lastKey: kvMatch[1]});
      } else {
        parent.obj[lastKey].push(parseValue(itemContent));
      }
      continue;
    }

    const kvMatch = trimmed.match(/^([^:]+):\s*(.*)/);
    if (!kvMatch) continue;

    const key = kvMatch[1].trim();
    const value = kvMatch[2].trim();

    while (stack.length > 1 && stack[stack.length - 1].indent >= indent) stack.pop();
    const parent = stack[stack.length - 1];

    if (value === '' || value === '|' || value === '>') {
      if (value === '|' || value === '>') {
        // Multi-line string
        let multiline = '';
        let j = i + 1;
        const blockIndent = j < lines.length ? lines[j].search(/\S/) : indent + 2;
        while (j < lines.length) {
          const lineIndent = lines[j].search(/\S/);
          if (lines[j].trim() === '') { multiline += '\n'; j++; continue; }
          if (lineIndent < blockIndent) break;
          multiline += (multiline ? (value === '|' ? '\n' : ' ') : '') + lines[j].trim();
          j++;
        }
        parent.obj[key] = multiline;
        parent.lastKey = key;
        i = j - 1;
      } else {
        parent.obj[key] = {};
        parent.lastKey = key;
        stack.push({obj: parent.obj[key], indent: indent, lastKey: key});
      }
    } else {
      parent.obj[key] = parseValue(value);
      parent.lastKey = key;
    }
  }
  return result;
}

function parseValue(v) {
  if (v === 'true') return true;
  if (v === 'false') return false;
  if (v === 'null' || v === '~') return null;
  if (/^-?\d+$/.test(v)) return parseInt(v, 10);
  if (/^-?\d+\.\d+$/.test(v)) return parseFloat(v);
  if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) return v.slice(1, -1);
  if (v.startsWith('[') && v.endsWith(']')) {
    try { return JSON.parse(v); } catch(e) {}
    return v.slice(1, -1).split(',').map(s => parseValue(s.trim()));
  }
  return v;
}

// ---- JSON to YAML serializer ----
function toYaml(obj, indent) {
  indent = indent || 0;
  const pad = '  '.repeat(indent);
  let result = '';

  if (Array.isArray(obj)) {
    obj.forEach(item => {
      if (typeof item === 'object' && item !== null && !Array.isArray(item)) {
        const keys = Object.keys(item);
        result += pad + '- ' + keys[0] + ': ' + yamlValue(item[keys[0]]) + '\n';
        keys.slice(1).forEach(k => {
          result += pad + '  ' + k + ': ' + yamlValue(item[k]) + '\n';
        });
      } else {
        result += pad + '- ' + yamlValue(item) + '\n';
      }
    });
  } else if (typeof obj === 'object' && obj !== null) {
    Object.entries(obj).forEach(([key, value]) => {
      if (typeof value === 'object' && value !== null) {
        result += pad + key + ':\n' + toYaml(value, indent + 1);
      } else {
        result += pad + key + ': ' + yamlValue(value) + '\n';
      }
    });
  }
  return result;
}

function yamlValue(v) {
  if (v === null) return 'null';
  if (typeof v === 'boolean') return v ? 'true' : 'false';
  if (typeof v === 'number') return String(v);
  if (typeof v === 'string') {
    if (v === '' || /[\s:#{}[\],&*?|>!%@`]/.test(v) || v === 'true' || v === 'false' || v === 'null' || /^-?\d/.test(v)) return '"' + v.replace(/"/g, '\\"') + '"';
    return v;
  }
  return String(v);
}

// ---- Conversion ----
function yamlToJson() {
  try {
    const obj = parseYaml(yamlInput.value);
    jsonInput.value = JSON.stringify(obj, null, 2);
    jsonInput.classList.remove('error');
    yamlInput.classList.remove('error');
    setStatus('yaml', true);
    setStatus('json', true);
    document.getElementById('yamlError').textContent = '';
    document.getElementById('jsonError').textContent = '';
  } catch(e) {
    setStatus('yaml', false);
    document.getElementById('yamlError').textContent = e.message;
  }
}

function jsonToYaml() {
  try {
    const obj = JSON.parse(jsonInput.value);
    yamlInput.value = toYaml(obj).trim();
    yamlInput.classList.remove('error');
    jsonInput.classList.remove('error');
    setStatus('json', true);
    setStatus('yaml', true);
    document.getElementById('jsonError').textContent = '';
    document.getElementById('yamlError').textContent = '';
  } catch(e) {
    setStatus('json', false);
    jsonInput.classList.add('error');
    document.getElementById('jsonError').textContent = e.message;
  }
}

function formatYaml() {
  try {
    const obj = parseYaml(yamlInput.value);
    yamlInput.value = toYaml(obj).trim();
    setStatus('yaml', true);
    document.getElementById('yamlError').textContent = '';
  } catch(e) {
    setStatus('yaml', false);
    document.getElementById('yamlError').textContent = e.message;
  }
}

function formatJson() {
  try {
    const obj = JSON.parse(jsonInput.value);
    jsonInput.value = JSON.stringify(obj, null, 2);
    setStatus('json', true);
    document.getElementById('jsonError').textContent = '';
  } catch(e) {
    setStatus('json', false);
    document.getElementById('jsonError').textContent = e.message;
  }
}

function setStatus(side, valid) {
  const el = document.getElementById(side + 'Status');
  el.textContent = valid ? 'Valid' : 'Invalid';
  el.className = 'status ' + (valid ? 'valid' : 'invalid');
}

function copyYaml() { navigator.clipboard.writeText(yamlInput.value); }
function copyJson() { navigator.clipboard.writeText(jsonInput.value); }

// Live validation on input
yamlInput.addEventListener('input', () => {
  try {
    parseYaml(yamlInput.value);
    setStatus('yaml', true);
    yamlInput.classList.remove('error');
    document.getElementById('yamlError').textContent = '';
  } catch(e) {
    setStatus('yaml', false);
    yamlInput.classList.add('error');
    document.getElementById('yamlError').textContent = e.message;
  }
});

jsonInput.addEventListener('input', () => {
  try {
    JSON.parse(jsonInput.value);
    setStatus('json', true);
    jsonInput.classList.remove('error');
    document.getElementById('jsonError').textContent = '';
  } catch(e) {
    setStatus('json', false);
    jsonInput.classList.add('error');
    document.getElementById('jsonError').textContent = e.message;
  }
});

// Init
yamlToJson();
</script>
<script src="/related.js"></script>
</body>
</html>
