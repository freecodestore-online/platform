<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e4e4e7;font-family:'Inter',sans-serif;padding:24px;min-height:100vh}
a{color:#22d3ee;text-decoration:none}
a:hover{text-decoration:underline}
.back{display:inline-block;margin-bottom:20px;font-size:14px}
h1{font-size:24px;font-weight:600;margin-bottom:20px}
.panel{background:#18181b;border:1px solid #27272a;border-radius:8px;padding:16px;margin-bottom:16px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
input,select{font-family:'Inter',sans-serif;font-size:13px;background:#09090b;color:#e4e4e7;border:1px solid #27272a;border-radius:6px;padding:8px 12px;outline:none}
input:focus{border-color:#22d3ee}
select{cursor:pointer}
button{font-family:'Inter',sans-serif;font-size:13px;background:#22d3ee;color:#09090b;font-weight:500;cursor:pointer;border:none;padding:8px 16px;border-radius:6px}
button:hover{opacity:0.9}
button.secondary{background:#27272a;color:#e4e4e7}
.section-title{font-size:13px;font-weight:500;color:#71717a;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;background:#09090b;border:1px solid #27272a;color:#71717a;font-family:'Inter',sans-serif}
.tab.active{background:#22d3ee;color:#09090b;border-color:#22d3ee}
.output{background:#09090b;border:1px solid #27272a;border-radius:6px;padding:12px;min-height:200px;max-height:500px;overflow-y:auto;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;white-space:pre-wrap}
.amount-input{width:80px}
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:12px;padding:8px}
.avatar-grid img{width:56px;height:56px;border-radius:50%;border:2px solid #27272a}
</style>
<meta name="description" content="Lorem Ipsum, fake names, emails, addresses, JSON mock APIs. Up to 100 items.">
<meta property="og:title" content="Mock Data Generator — FreeCodeStore">
<meta property="og:description" content="Lorem Ipsum, fake names, emails, addresses, JSON mock APIs. Up to 100 items.">

<body>
<a class="back" href="/">&#8592; All Tools</a>
<h1>Text &amp; Data Generator</h1>

<div class="tabs">
<div class="tab active" data-tab="lorem">Lorem Ipsum</div>
<div class="tab" data-tab="names">Names</div>
<div class="tab" data-tab="emails">Emails</div>
<div class="tab" data-tab="addresses">Addresses</div>
<div class="tab" data-tab="json">JSON</div>
<div class="tab" data-tab="avatars">Avatars</div>
</div>

<div class="panel" id="controls">
<div class="row">
<label style="font-size:13px;color:#71717a">Amount:</label>
<input type="number" id="amount" class="amount-input" value="5" min="1" max="100">
<select id="loremUnit">
<option value="paragraphs">Paragraphs</option>
<option value="sentences">Sentences</option>
<option value="words">Words</option>
</select>
<button onclick="generate()">Generate</button>
</div>
<div class="row">
<label style="font-size:13px;color:#71717a">Copy as:</label>
<button class="secondary" onclick="copyAs('text')">Plain Text</button>
<button class="secondary" onclick="copyAs('json')">JSON</button>
<button class="secondary" onclick="copyAs('csv')">CSV</button>
</div>
</div>

<div class="panel">
<div class="section-title">Output</div>
<div class="output" id="output"></div>
</div>

<script>
let currentTab = 'lorem';
let generated = [];

const LOREM = "Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua Ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur Excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium totam rem aperiam eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt Neque porro quisquam est qui dolorem ipsum quia dolor sit amet consectetur adipisci velit sed quia non numquam eius modi tempora incidunt ut labore et dolore magnam aliquam quaerat voluptatem Ut enim ad minima veniam quis nostrum exercitationem ullam corporis suscipit laboriosam nisi ut aliquid ex ea commodi consequatur".split(' ');

const FIRST_NAMES = ['James','Mary','Robert','Patricia','John','Jennifer','Michael','Linda','David','Elizabeth','William','Barbara','Richard','Susan','Joseph','Jessica','Thomas','Sarah','Charles','Karen','Christopher','Lisa','Daniel','Nancy','Matthew','Betty','Anthony','Margaret','Mark','Sandra','Donald','Ashley','Steven','Kimberly','Paul','Emily','Andrew','Donna','Joshua','Michelle','Kenneth','Carol','Kevin','Amanda','Brian','Dorothy','George','Melissa','Timothy','Deborah','Alex','Sophia','Ryan','Olivia','Noah','Emma','Liam','Ava','Ethan','Isabella','Lucas','Mia','Mason','Charlotte','Logan','Amelia','Aiden','Harper','Jackson','Evelyn'];
const LAST_NAMES = ['Smith','Johnson','Williams','Brown','Jones','Garcia','Miller','Davis','Rodriguez','Martinez','Hernandez','Lopez','Gonzalez','Wilson','Anderson','Thomas','Taylor','Moore','Jackson','Martin','Lee','Perez','Thompson','White','Harris','Sanchez','Clark','Ramirez','Lewis','Robinson','Walker','Young','Allen','King','Wright','Scott','Torres','Nguyen','Hill','Flores','Green','Adams','Nelson','Baker','Hall','Rivera','Campbell','Mitchell','Carter','Roberts'];
const STREETS = ['Main','Oak','Maple','Cedar','Pine','Elm','Park','Walnut','Lake','Hill','Spring','River','Forest','Sunset','Highland','Valley','Meadow','Church','Washington','Lincoln'];
const STREET_TYPES = ['St','Ave','Blvd','Dr','Ln','Rd','Way','Ct','Pl','Cir'];
const CITIES = ['New York','Los Angeles','Chicago','Houston','Phoenix','Philadelphia','San Antonio','San Diego','Dallas','Austin','Jacksonville','San Jose','Columbus','Charlotte','Indianapolis','San Francisco','Seattle','Denver','Nashville','Portland','Memphis','Louisville','Baltimore','Milwaukee','Albuquerque','Tucson','Fresno','Sacramento','Mesa','Kansas City'];
const STATES = ['AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD','MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC','SD','TN','TX','UT','VT','VA','WA','WV','WI','WY'];
const DOMAINS = ['gmail.com','yahoo.com','outlook.com','hotmail.com','protonmail.com','icloud.com','mail.com','fastmail.com'];
const COMPANIES = ['Acme Corp','Globex','Initech','Umbrella','Stark Industries','Wayne Enterprises','Cyberdyne','Soylent Corp','Aperture Science','Massive Dynamic'];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function genLorem(count, unit) {
  const results = [];
  if (unit === 'words') {
    const words = [];
    for (let i = 0; i < count; i++) words.push(pick(LOREM).toLowerCase());
    words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
    results.push(words.join(' '));
  } else if (unit === 'sentences') {
    for (let i = 0; i < count; i++) {
      const len = randInt(8, 18);
      const words = [];
      for (let j = 0; j < len; j++) words.push(pick(LOREM).toLowerCase());
      words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
      results.push(words.join(' ') + '.');
    }
  } else {
    for (let i = 0; i < count; i++) {
      const sentCount = randInt(3, 7);
      const sents = [];
      for (let s = 0; s < sentCount; s++) {
        const len = randInt(8, 18);
        const words = [];
        for (let j = 0; j < len; j++) words.push(pick(LOREM).toLowerCase());
        words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
        sents.push(words.join(' ') + '.');
      }
      results.push(sents.join(' '));
    }
  }
  return results;
}

function genNames(count) {
  const results = [];
  for (let i = 0; i < count; i++) results.push(pick(FIRST_NAMES) + ' ' + pick(LAST_NAMES));
  return results;
}

function genEmails(count) {
  const results = [];
  for (let i = 0; i < count; i++) {
    const first = pick(FIRST_NAMES).toLowerCase();
    const last = pick(LAST_NAMES).toLowerCase();
    const sep = pick(['.','_','']);
    const num = Math.random() > 0.5 ? randInt(1, 99) : '';
    results.push(first + sep + last + num + '@' + pick(DOMAINS));
  }
  return results;
}

function genAddresses(count) {
  const results = [];
  for (let i = 0; i < count; i++) {
    const num = randInt(100, 9999);
    const street = pick(STREETS) + ' ' + pick(STREET_TYPES);
    const city = pick(CITIES);
    const state = pick(STATES);
    const zip = String(randInt(10000, 99999));
    results.push(`${num} ${street}, ${city}, ${state} ${zip}`);
  }
  return results;
}

function genJson(count) {
  const type = ['users', 'products', 'posts'][Math.floor(Math.random() * 3)];
  const items = [];
  for (let i = 0; i < count; i++) {
    if (type === 'users') {
      const first = pick(FIRST_NAMES);
      const last = pick(LAST_NAMES);
      items.push({
        id: i + 1,
        name: first + ' ' + last,
        email: (first + '.' + last).toLowerCase() + '@' + pick(DOMAINS),
        age: randInt(18, 65),
        company: pick(COMPANIES),
        active: Math.random() > 0.3
      });
    } else if (type === 'products') {
      const adj = pick(['Premium','Basic','Pro','Ultra','Mini','Classic','Modern','Smart','Elite','Eco']);
      const noun = pick(['Widget','Gadget','Device','Tool','Kit','Pack','Bundle','Module','System','Unit']);
      items.push({
        id: i + 1,
        name: adj + ' ' + noun,
        price: parseFloat((Math.random() * 200 + 5).toFixed(2)),
        category: pick(['electronics','clothing','home','sports','books','toys']),
        inStock: Math.random() > 0.2,
        rating: parseFloat((Math.random() * 4 + 1).toFixed(1))
      });
    } else {
      items.push({
        id: i + 1,
        title: 'Post ' + (i + 1) + ': ' + pick(['Getting Started','Best Practices','Deep Dive','Tutorial','Guide','Review','Analysis','Comparison','How To','Tips']) + ' with ' + pick(['React','Vue','Node','Python','TypeScript','Rust','Go','Svelte','Next.js','Astro']),
        author: pick(FIRST_NAMES) + ' ' + pick(LAST_NAMES),
        published: new Date(Date.now() - randInt(0, 365 * 24 * 60 * 60 * 1000)).toISOString().split('T')[0],
        tags: [pick(['javascript','python','devops','web','mobile','ai']), pick(['tutorial','guide','review','opinion'])],
        likes: randInt(0, 500)
      });
    }
  }
  return [JSON.stringify({[type]: items}, null, 2)];
}

function genAvatars(count) {
  const names = genNames(count);
  return names.map(n => ({name: n, url: `https://ui-avatars.com/api/?name=${encodeURIComponent(n)}&size=112&background=22d3ee&color=09090b&bold=true`}));
}

function generate() {
  const count = Math.min(100, Math.max(1, parseInt(document.getElementById('amount').value) || 5));
  const output = document.getElementById('output');

  if (currentTab === 'lorem') {
    const unit = document.getElementById('loremUnit').value;
    generated = genLorem(count, unit);
    output.textContent = generated.join('\n\n');
  } else if (currentTab === 'names') {
    generated = genNames(count);
    output.textContent = generated.join('\n');
  } else if (currentTab === 'emails') {
    generated = genEmails(count);
    output.textContent = generated.join('\n');
  } else if (currentTab === 'addresses') {
    generated = genAddresses(count);
    output.textContent = generated.join('\n');
  } else if (currentTab === 'json') {
    generated = genJson(count);
    output.textContent = generated[0];
  } else if (currentTab === 'avatars') {
    const avatars = genAvatars(count);
    generated = avatars.map(a => a.url);
    output.innerHTML = '<div class="avatar-grid">' + avatars.map(a => `<div style="text-align:center"><img src="${a.url}" alt="${a.name}"><div style="font-size:10px;color:#71717a;margin-top:4px">${a.name.split(' ')[0]}</div></div>`).join('') + '</div>';
  }
}

function copyAs(format) {
  let text = '';
  if (format === 'json') {
    text = JSON.stringify(generated, null, 2);
  } else if (format === 'csv') {
    text = generated.join('\n');
  } else {
    text = generated.join('\n');
  }
  navigator.clipboard.writeText(text);
}

// Tabs
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  currentTab = t.dataset.tab;
  const loremUnit = document.getElementById('loremUnit');
  loremUnit.style.display = currentTab === 'lorem' ? '' : 'none';
  generate();
});

generate();
</script>
<script src="/related.js"></script>
</body>
</html>
