<script>
let currentLang = 'css';
let lastOutput = '';

const samples = {
  css: `/* Reset styles */

function debounce(fn, delay) {
  let timer;
  return function (...args) {
    clearTimeout(timer);
    timer = setTimeout(() => {
      fn.apply(this, args);
    }, delay);
  };
}

function formatBytes(bytes) {
  if (bytes === 0) return '0 B';
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(1) + ' ' + sizes[i];
}

// Tabs
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  currentLang = t.dataset.lang;
  document.getElementById('input').value = samples[currentLang];
  document.getElementById('output').textContent = '';
  document.getElementById('stats').innerHTML = '';
});

function getIndent() {
  const v = document.getElementById('indentSize').value;
  return v === 'tab' ? '\t' : ' '.repeat(parseInt(v));
}

// CSS minifier
function minifyCss(css) {
  return css
    .replace(/\/\*[\s\S]*?\*\//g, '')
    .replace(/\s+/g, ' ')
    .replace(/\s*([{}:;,>~+])\s*/g, '$1')
    .replace(/;}/g, '}')
    .replace(/#([0-9a-fA-F])\1([0-9a-fA-F])\2([0-9a-fA-F])\3\b/g, '#$1$2$3')
    .replace(/\s*!important/g, '!important')
    .replace(/(:| )0(px|em|rem|%)/g, '$10')
    .trim();
}

function beautifyCss(css) {
  const ind = getIndent();
  let result = css.replace(/\/\*[\s\S]*?\*\//g, m => '\n' + m + '\n');
  result = result.replace(/\s*{\s*/g, ' {\n').replace(/\s*}\s*/g, '\n}\n\n').replace(/;\s*/g, ';\n');
  const lines = result.split('\n');
  let level = 0;
  return lines.map(line => {
    line = line.trim();
    if (!line) return '';
    if (line === '}') { level = Math.max(0, level - 1); return ind.repeat(level) + line; }
    const out = ind.repeat(level) + line;
    if (line.endsWith('{')) level++;
    return out;
  }).filter((l, i, a) => !(l === '' && a[i - 1] === '')).join('\n').trim();
}

// JS minifier (basic, no AST)
function minifyJs(js) {
  return js
    .replace(/\/\/.*$/gm, '')
    .replace(/\/\*[\s\S]*?\*\//g, '')
    .replace(/\n\s*/g, ' ')
    .replace(/\s+/g, ' ')
    .replace(/\s*([{}()=+\-*/<>!&|:;,?])\s*/g, '$1')
    .replace(/;\s*}/g, '}')
    .trim();
}

function beautifyJs(js) {
  const ind = getIndent();
  let result = '';
  let level = 0;
  let inString = false;
  let stringChar = '';

  const tokens = js.replace(/\s+/g, ' ').trim();
  for (let i = 0; i < tokens.length; i++) {
    const c = tokens[i];
    if (inString) {
      result += c;
      if (c === stringChar && tokens[i - 1] !== '\\') inString = false;
      continue;
    }
    if (c === '"' || c === "'" || c === '`') { inString = true; stringChar = c; result += c; continue; }
    if (c === '{') { result += ' {\n' + ind.repeat(++level); continue; }
    if (c === '}') { result = result.trimEnd(); result += '\n' + ind.repeat(--level) + '}\n' + ind.repeat(level); continue; }
    if (c === ';') { result += ';\n' + ind.repeat(level); continue; }
    result += c;
  }
  return result.replace(/\n\s*\n\s*\n/g, '\n\n').trim();
}

// HTML minifier
function minifyHtml(html) {
  return html
    .replace(/<!--[\s\S]*?-->/g, '')
    .replace(/>\s+</g, '><')
    .replace(/\s+/g, ' ')
    .replace(/\s*\/>/g, '/>')
    .trim();
}

function beautifyHtml(html) {
  const ind = getIndent();
  const selfClosing = ['br','hr','img','input','meta','link','area','base','col','embed','source','track','wbr'];
  let result = '';
  let level = 0;

  html = html.replace(/>\s+</g, '><').replace(/\s+/g, ' ').trim();
  const parts = html.split(/(<[^>]+>)/g).filter(Boolean);

  for (const part of parts) {
    const trimmed = part.trim();
    if (!trimmed) continue;

    if (trimmed.startsWith('</')) {
      level = Math.max(0, level - 1);
      result += ind.repeat(level) + trimmed + '\n';
    } else if (trimmed.startsWith('<')) {
      result += ind.repeat(level) + trimmed + '\n';
      const tag = trimmed.match(/<([a-zA-Z][a-zA-Z0-9]*)/);
      if (tag && !selfClosing.includes(tag[1].toLowerCase()) && !trimmed.endsWith('/>') && !trimmed.startsWith('<!') && !trimmed.startsWith('<?')) {
        level++;
      }
    } else {
      result += ind.repeat(level) + trimmed + '\n';
    }
  }
  return result.trim();
}

function doMinify() {
  const input = document.getElementById('input').value;
  let output = '';
  if (currentLang === 'css') output = minifyCss(input);
  else if (currentLang === 'js') output = minifyJs(input);
  else output = minifyHtml(input);
  showOutput(output, input);
}

function doBeautify() {
  const input = document.getElementById('input').value;
  let output = '';
  if (currentLang === 'css') output = beautifyCss(input);
  else if (currentLang === 'js') output = beautifyJs(input);
  else output = beautifyHtml(input);
  showOutput(output, input);
}

function showOutput(output, input) {
  lastOutput = output;
  document.getElementById('output').textContent = output;
  const origSize = new Blob([input]).size;
  const outSize = new Blob([output]).size;
  const diff = origSize - outSize;
  const pct = origSize ? ((diff / origSize) * 100).toFixed(1) : 0;
  const cls = diff > 0 ? 'saved' : diff < 0 ? 'bigger' : '';
  document.getElementById('stats').innerHTML =
    `<span>Original: ${origSize} B</span>` +
    `<span>Output: ${outSize} B</span>` +
    `<span class="${cls}">${diff > 0 ? 'Saved' : diff < 0 ? 'Added' : 'Same'}: ${Math.abs(diff)} B (${Math.abs(pct)}%)</span>`;
}

function copyOutput() {
  if (lastOutput) navigator.clipboard.writeText(lastOutput);
}
