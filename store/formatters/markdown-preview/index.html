<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

function ins(before, after) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'text';
  editor.value = editor.value.substring(0, s) + before + sel + after + editor.value.substring(e);
  editor.focus();
  editor.selectionStart = s + before.length;
  editor.selectionEnd = s + before.length + sel.length;
  render();
}

function insPre(prefix) {
  const s = editor.selectionStart;
  const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
  editor.value = editor.value.substring(0, lineStart) + prefix + editor.value.substring(lineStart);
  editor.focus();
  render();
}

function insBlock(before, after) {
  const s = editor.selectionStart, e = editor.selectionEnd;
  const sel = editor.value.substring(s, e) || 'code here';
  editor.value = editor.value.substring(0, s) + '\n' + before + sel + after + '\n' + editor.value.substring(e);
  editor.focus();
  render();
}

function insTable() {
  const tbl = '\n| Header | Header | Header |\n|--------|--------|--------|\n| Cell   | Cell   | Cell   |\n| Cell   | Cell   | Cell   |\n';
  const s = editor.selectionStart;
  editor.value = editor.value.substring(0, s) + tbl + editor.value.substring(s);
  editor.focus();
  render();
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlightCode(code, lang) {
  let h = escapeHtml(code);
  if (['js','javascript','ts','typescript','jsx','tsx'].includes(lang)) {
    h = h.replace(/(\/\/.*$)/gm, '<span class="cmt">$1</span>')
      .replace(/\b(const|let|var|function|return|if|else|for|while|class|import|export|from|async|await|new|this|typeof|instanceof)\b/g, '<span class="kw">$1</span>')
      .replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|`(?:[^`\\]|\\.)*`)/g, '<span class="str">$1</span>')
      .replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  } else if (['python','py'].includes(lang)) {
    h = h.replace(/(#.*$)/gm, '<span class="cmt">$1</span>')
      .replace(/\b(def|class|import|from|return|if|elif|else|for|while|with|as|try|except|finally|raise|yield|lambda|and|or|not|in|is|True|False|None)\b/g, '<span class="kw">$1</span>')
      .replace(/('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*")/g, '<span class="str">$1</span>');
  } else if (['css','scss'].includes(lang)) {
    h = h.replace(/(\/\*[\s\S]*?\*\/)/g, '<span class="cmt">$1</span>')
      .replace(/([a-z-]+)\s*:/g, '<span class="kw">$1</span>:')
      .replace(/(\d+\.?\d*(px|em|rem|%|vh|vw|s|ms))/g, '<span class="num">$1</span>');
  } else if (['html','xml'].includes(lang)) {
    h = h.replace(/(&lt;\/?[a-zA-Z][a-zA-Z0-9-]*)/g, '<span class="kw">$1</span>')
      .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="cmt">$1</span>')
      .replace(/("[^"]*")/g, '<span class="str">$1</span>');
  } else if (['bash','sh','shell'].includes(lang)) {
    h = h.replace(/(#.*$)/gm, '<span class="cmt">$1</span>')
      .replace(/\b(if|then|else|fi|for|do|done|while|case|esac|function|echo|export|source|cd|ls|grep|sed|awk)\b/g, '<span class="kw">$1</span>')
      .replace(/("[^"]*"|'[^']*')/g, '<span class="str">$1</span>');
  } else if (['json'].includes(lang)) {
    h = h.replace(/("(?:[^"\\]|\\.)*")\s*:/g, '<span class="kw">$1</span>:')
      .replace(/:\s*("(?:[^"\\]|\\.)*")/g, ': <span class="str">$1</span>')
      .replace(/\b(true|false|null)\b/g, '<span class="kw">$1</span>')
      .replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  } else if (['sql'].includes(lang)) {
    h = h.replace(/\b(SELECT|FROM|WHERE|JOIN|INNER|LEFT|RIGHT|ON|AND|OR|ORDER BY|GROUP BY|HAVING|LIMIT|INSERT|INTO|VALUES|UPDATE|SET|DELETE|CREATE|TABLE|DROP|ALTER|INDEX|AS|DISTINCT|COUNT|SUM|AVG|MIN|MAX|NULL|NOT|IN|BETWEEN|LIKE|UNION|ALL|PRIMARY|KEY|FOREIGN|REFERENCES)\b/gi, '<span class="kw">$&</span>')
      .replace(/('(?:[^'\\]|\\.)*')/g, '<span class="str">$1</span>');
  }
  return h;
}

function parseMd(md) {
  const lines = md.split('\n');
  let html = '';
  let inCode = false, codeLang = '', codeContent = '';
  let inList = false, listType = '';
  let inTable = false, tableRows = [];

  function flushList() {
    if (inList) { html += '</' + listType + '>'; inList = false; }
  }
  function flushTable() {
    if (inTable && tableRows.length) {
      html += '<table>';
      tableRows.forEach((row, i) => {
        const tag = i === 0 ? 'th' : 'td';
        const cells = row.split('|').filter(c => c.trim() !== '');
        html += '<tr>' + cells.map(c => `<${tag}>${parseInline(c.trim())}</${tag}>`).join('') + '</tr>';
      });
      html += '</table>';
      tableRows = [];
      inTable = false;
    }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith('```')) {
      if (inCode) {
        html += '<pre><code>' + highlightCode(codeContent.slice(0, -1), codeLang) + '</code></pre>';
        inCode = false; codeContent = '';
      } else {
        flushList(); flushTable();
        inCode = true; codeLang = line.slice(3).trim();
      }
      continue;
    }
    if (inCode) { codeContent += line + '\n'; continue; }

    // Table
    if (line.match(/^\|(.+\|)+\s*$/)) {
      flushList();
      if (!inTable) inTable = true;
      if (!line.match(/^\|[\s-:|]+\|$/)) tableRows.push(line);
      continue;
    } else { flushTable(); }

    // Headings
    const hMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (hMatch) { flushList(); const lvl = hMatch[1].length; const id = hMatch[2].toLowerCase().replace(/[^\w]+/g,'-'); html += `<h${lvl} id="${id}">${parseInline(hMatch[2])}</h${lvl}>`; continue; }

    // HR
    if (line.match(/^(\*{3,}|-{3,}|_{3,})\s*$/)) { flushList(); html += '<hr>'; continue; }

    // Blockquote
    if (line.startsWith('> ')) { flushList(); html += '<blockquote>' + parseInline(line.slice(2)) + '</blockquote>'; continue; }

    // Task list
    const taskMatch = line.match(/^[-*]\s+\[([ xX])\]\s+(.+)$/);
    if (taskMatch) {
      if (!inList || listType !== 'ul') { flushList(); html += '<ul>'; inList = true; listType = 'ul'; }
      const checked = taskMatch[1] !== ' ' ? ' checked disabled' : ' disabled';
      html += `<li><input type="checkbox"${checked}>${parseInline(taskMatch[2])}</li>`;
      continue;
    }

    // UL
    const ulMatch = line.match(/^[-*+]\s+(.+)$/);
    if (ulMatch) {
      if (!inList || listType !== 'ul') { flushList(); html += '<ul>'; inList = true; listType = 'ul'; }
      html += '<li>' + parseInline(ulMatch[1]) + '</li>';
      continue;
    }

    // OL
    const olMatch = line.match(/^\d+\.\s+(.+)$/);
    if (olMatch) {
      if (!inList || listType !== 'ol') { flushList(); html += '<ol>'; inList = true; listType = 'ol'; }
      html += '<li>' + parseInline(olMatch[1]) + '</li>';
      continue;
    }

    flushList();

    if (line.trim() === '') { html += ''; continue; }
    html += '<p>' + parseInline(line) + '</p>';
  }
  if (inCode) html += '<pre><code>' + highlightCode(codeContent, codeLang) + '</code></pre>';
  flushList(); flushTable();
  return html;
}

function parseInline(text) {
  return text
    .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>');
}

function render() {
  const md = editor.value;
  preview.innerHTML = parseMd(md);
  updateStats(md);
  updateToc(md);
}

function updateStats(md) {
  const words = md.trim().split(/\s+/).filter(w => w.length > 0).length;
  document.getElementById('wordCount').textContent = words + ' words';
  document.getElementById('readTime').textContent = Math.max(1, Math.ceil(words / 200)) + ' min read';
}

function updateToc(md) {
  const headings = [];
  md.split('\n').forEach(line => {
    const m = line.match(/^(#{1,3})\s+(.+)$/);
    if (m) headings.push({level: m[1].length, text: m[2], id: m[2].toLowerCase().replace(/[^\w]+/g, '-')});
  });
  const tocList = document.getElementById('tocList');
  tocList.innerHTML = headings.map(h => `<a class="h${h.level}" href="#${h.id}">${h.text}</a>`).join('');
}

function toggleToc() {
  document.getElementById('toc').classList.toggle('visible');
}

function toggleFullscreen() {
  preview.classList.toggle('fullscreen');
}

function copyHtml() {
  navigator.clipboard.writeText(preview.innerHTML);
}

function downloadMd() {
  download(editor.value, 'document.md', 'text/markdown');
}

function downloadHtml() {
  const html = `<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="UTF-8"><title>Document</title></head>\n<body>\n${preview.innerHTML}\n</body>\n</html>`;
  download(html, 'document.html', 'text/html');
}

function download(content, filename, type) {
  const blob = new Blob([content], {type});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

editor.addEventListener('input', render);
render();
</script>
<script src="/related.js"></script>
</body>
